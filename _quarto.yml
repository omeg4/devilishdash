project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "notes/**/*.qmd"
    - "projects/**/*.qmd"
  resources:
    - "data/warehouse.duckdb"  # excluded; just a marker

website:
  title: "Matthew Brunetti"
  description: "Hockey analytics & data work"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: projects/index.qmd
        text: Projects
      - href: notes/index.qmd
        text: Notes
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/<your-github-username>/devilishdash
      - icon: twitter
        href: https://twitter.com/<your-handle>
  page-footer:
    left: "© Matthew Brunetti"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    code-fold: true
    code-tools: true
    fig-format: svg
    fig-responsive: true
    css: styles.css
